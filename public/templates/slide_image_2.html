<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; overflow-x: hidden; }
        .slide { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
        .slide img.background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .heading { position: absolute; left: 1094.4px; top: 65.39px; font-size: 48px; color: white; font-weight: 400; line-height: 0.9; white-space: nowrap; }
        .text-content { position: absolute; left: 1094.4px; top: 151.65px; width: 686px; font-size: 32px; color: white; font-weight: 400; line-height: 34px; white-space: pre-wrap; }
        .text-content p { margin-bottom: 18px; }
        .image-placeholder { position: absolute; left: -146.51px; top: -6.72px; width: 1093px; height: 1093px; transform: rotate(180deg) scaleY(-1); object-fit: cover; }
        .footer-logo { position: absolute; left: 1606.53px; top: 953.94px; width: 225px; height: 62px; }
    </style>
</head>
<body>
    <div class="slide">
        <img src="/assets/91c825f6107036a4b04b5de1798624c0250fa53c.png" alt="" class="background">
        <img src="/assets/e9cb1099bc29ec9dc62e7b665222b3619e294c9b.png" alt="" class="image-placeholder">
        <p class="heading">{{title}}</p>
        <div class="text-content">
            <p>{{paragraph1}}</p>
            <p>{{paragraph2}}</p>
        </div>
        <img src="/assets/1fcb1065a69e3b98f5d3209cc5c4a157837f949e.png" alt="" class="footer-logo">
    </div>
</body>
</html>
