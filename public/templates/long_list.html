<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; overflow-x: hidden; }
        .slide { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
        .slide img.background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .heading { position: absolute; left: 88.32px; top: 61.44px; font-size: 48px; color: white; font-weight: 400; line-height: 0.9; white-space: nowrap; }
        .list-container { position: absolute; left: 79.56px; top: 180.98px; width: 1400px; font-size: 32px; color: white; font-weight: 400; column-count: 2; column-gap: 80px; list-style-position: inside; }
        .list-container li { margin-bottom: 20px; break-inside: avoid; }
        .list-container li:empty { display: none; }
        .footer-logo { position: absolute; left: 1606.53px; top: 953.94px; width: 225px; height: 62px; }
    </style>
</head>
<body>
    <div class="slide">
        <img src="/assets/91c825f6107036a4b04b5de1798624c0250fa53c.png" alt="" class="background">
        <p class="heading">{{title}}</p>
        <ul class="list-container">
            <li>{{list_item_1}}</li>
            <li>{{list_item_2}}</li>
            <li>{{list_item_3}}</li>
            <li>{{list_item_4}}</li>
            <li>{{list_item_5}}</li>
            <li>{{list_item_6}}</li>
            <li>{{list_item_7}}</li>
            <li>{{list_item_8}}</li>
            <li>{{list_item_9}}</li>
            <li>{{list_item_10}}</li>
            <li>{{list_item_11}}</li>
            <li>{{list_item_12}}</li>
            <li>{{list_item_13}}</li>
        </ul>
        <img src="/assets/1fcb1065a69e3b98f5d3209cc5c4a157837f949e.png" alt="" class="footer-logo">
    </div>
</body>
</html>
