<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; overflow-x: hidden; }
        .slide { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
        .slide img.background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .heading { position: absolute; left: 88.32px; top: 61.44px; font-size: 48px; color: white; font-weight: 400; line-height: 0.9; white-space: nowrap; }
        .text-content { position: absolute; left: 78.32px; top: 147.7px; width: 699px; font-size: 32px; color: white; font-weight: 400; line-height: 34px; white-space: pre-wrap; }
        .text-content p { margin-bottom: 18px; }
        .image-placeholder { position: absolute; left: 973.51px; top: 0; width: 1080px; height: 1080px; object-fit: cover; }
        .footer-logo { position: absolute; left: 81.56px; top: 937.67px; width: 225px; height: 62px; }
    </style>
</head>
<body>
    <div class="slide">
        <img src="/assets/91c825f6107036a4b04b5de1798624c0250fa53c.png" alt="" class="background">
        <img src="/assets/cf020cf52bfc734d596e06e6ed617b2f7fbe34d4.png" alt="" class="image-placeholder">
        <p class="heading">{{title}}</p>
        <div class="text-content">
            <p>{{paragraph1}}</p>
            <p>{{paragraph2}}</p>
        </div>
        <img src="/assets/1fcb1065a69e3b98f5d3209cc5c4a157837f949e.png" alt="" class="footer-logo">
    </div>
</body>
</html>
