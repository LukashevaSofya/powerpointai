<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; overflow-x: hidden; }
        .slide { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
        .slide img.background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .logo { position: absolute; left: 80.5px; top: 80.75px; width: 319px; height: 87px; }
        .avatar { position: absolute; left: 81.25px; top: 502.57px; width: 130px; height: 131px; border-radius: 50%; object-fit: cover; }
        .author-info { position: absolute; left: 315.79px; top: 578.32px; width: 326.71px; font-weight: 400; line-height: 1.2; }
        .author-info .name { font-size: 48px; color: white; margin-bottom: 0; }
        .author-info .job-title { font-size: 24px; color: #a6a6a6; }
        .main-heading { position: absolute; left: 81px; top: 50%; transform: translateY(-50%); width: 1400px; font-size: 84px; line-height: 80px; font-weight: 400; color: white; display: flex; flex-direction: column; justify-content: flex-end; }
    </style>
</head>
<body>
    <div class="slide">
        <img src="/assets/6361b1c3ce7c16cafa967d0a2a49e6cd08cff83d.png" alt="" class="background">
        <img src="/assets/4cce4941abc900d8328cc7c84a332b8d0251ec15.png" alt="" class="logo">
        <img src="/assets/20af95fd83ad18f7f8f3cfd9a46040bd59dfada7.png" alt="" class="avatar">
        <div class="author-info">
            <p class="name">{{name}}</p>
            <p class="job-title">{{position}}</p>
        </div>
        <div class="main-heading">
            <p>{{title}}</p>
            <p>{{subtitle}}</p>
            <p>{{description}}</p>
        </div>
    </div>
</body>
</html>
